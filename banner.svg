<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: clean white to soft warm grey -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1"/>
    </linearGradient>

    <!-- Accent line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#111111;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#111111;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111111;stop-opacity:0"/>
    </linearGradient>

    <!-- Dot pattern mask -->
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#cccccc" opacity="0.5"/>
    </pattern>

    <!-- Clip path for reveal animation -->
    <clipPath id="revealClip">
      <rect x="0" y="0" width="0" height="200">
        <animate attributeName="width" from="0" to="900" dur="1.2s" ease="ease-out" fill="freeze"/>
      </rect>
    </clipPath>

    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bgGrad)" rx="0"/>

  <!-- Dot grid texture -->
  <rect width="900" height="200" fill="url(#dots)"/>

  <!-- Left geometric accent block -->
  <rect x="0" y="0" width="5" height="200" fill="#111111" opacity="0.9">
    <animate attributeName="height" from="0" to="200" dur="0.8s" fill="freeze"/>
  </rect>

  <!-- Decorative geometric shapes -->
  <rect x="820" y="20" width="60" height="60" fill="none" stroke="#e0e0e0" stroke-width="1.5" rx="2" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="0 850 50" to="360 850 50" dur="20s" repeatCount="indefinite"/>
  </rect>
  <rect x="830" y="30" width="40" height="40" fill="none" stroke="#cccccc" stroke-width="1" rx="1" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="360 850 50" to="0 850 50" dur="15s" repeatCount="indefinite"/>
  </rect>

  <!-- Small accent circles -->
  <circle cx="60" cy="168" r="3" fill="#111111" opacity="0.2"/>
  <circle cx="75" cy="168" r="3" fill="#111111" opacity="0.15"/>
  <circle cx="90" cy="168" r="3" fill="#111111" opacity="0.1"/>

  <!-- Top thin accent line -->
  <line x1="40" y1="24" x2="860" y2="24" stroke="#e8e8e8" stroke-width="0.5"/>

  <!-- MAIN NAME TEXT with staggered fade-in -->
  <text x="50" y="95" font-family="'Georgia', 'Times New Roman', serif" font-size="52" font-weight="700" fill="#111111" letter-spacing="-1" filter="url(#softShadow)" opacity="0">
    Tanmay Chouhan
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.4s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 10" to="0 0" dur="0.8s" begin="0.4s" fill="freeze"/>
  </text>

  <!-- Thin rule under name -->
  <line x1="50" y1="108" x2="0" y2="108" stroke="#111111" stroke-width="1.5" opacity="0.9">
    <animate attributeName="x2" from="50" to="480" dur="0.9s" begin="0.9s" fill="freeze"/>
  </line>

  <!-- ROLE TEXT - types in one by one feel -->
  <text x="50" y="135" font-family="'Courier New', Courier, monospace" font-size="13.5" fill="#555555" letter-spacing="2" opacity="0">
    STUDENT  ·  WEB DEVELOPER  ·  AI VOICE AGENT MAKER  ·  PROMPT ENGINEER
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.2s" fill="freeze"/>
  </text>

  <!-- Bottom accent line -->
  <line x1="50" y1="155" x2="0" y2="155" stroke="#dddddd" stroke-width="0.8" opacity="1">
    <animate attributeName="x2" from="50" to="700" dur="1s" begin="1.5s" fill="freeze"/>
  </line>

  <!-- Small label tag bottom right -->
  <rect x="760" y="155" width="120" height="26" rx="13" fill="#111111" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.8s" fill="freeze"/>
  </rect>
  <text x="820" y="173" font-family="'Courier New', Courier, monospace" font-size="10" fill="#ffffff" text-anchor="middle" letter-spacing="1.5" opacity="0">
    OPEN TO WORK
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.8s" fill="freeze"/>
  </text>

  <!-- Blinking cursor after subtitle -->
  <rect x="50" y="141" width="7" height="1.5" fill="#111111" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0s" begin="1.2s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="1s" begin="2s" repeatCount="indefinite"/>
  </rect>

</svg>
